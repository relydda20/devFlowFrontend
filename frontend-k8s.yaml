apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-react
  namespace: who-goes-to-try
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: react-app
        image: DOCKER_USERNAME/frontend-react:latest # Ganti dengan username Docker Hub kamu
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: who-goes-to-try
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: who-goes-to-try
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: who-goes-to-try.hackathon.sev-2.com # Ganti dengan domain dari panitia
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
